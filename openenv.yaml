spec_version: 1
name: FinanceEnv
name_slug: finance_env
type: space
runtime: fastapi
app: server.app:app
port: 7860
description: >
  Multi-source personal finance environment. Trains agents to categorize
  transactions, reconcile cross-source duplicates, and build realistic budgets.

observation_space:
  type: structured
  description: >
    Structured financial state including transactions, account balance,
    task context, step count, and reward feedback.

action_space:
  type: structured
  description: >
    Financial operations: categorize, reconcile, query, set_budget, finalize.

endpoints:
  health: /health
  reset: /reset
  step: /step
  state: /state
  schema: /schema

tasks:
  - id: task1
    name: Transaction Categorisation
    difficulty: easy
    max_steps: 2
    description: >
      Assign 20 SBI transactions to one of 9 canonical spending categories,
      then finalize.
  - id: task2
    name: Cross-Source Reconciliation
    difficulty: medium
    max_steps: 3
    description: >
      Identify duplicate transactions across 3 sources and submit
      reconciled monthly spend totals.
  - id: task3
    name: Forward Budget Planning
    difficulty: hard
    max_steps: 4
    description: >
      Build a ₹85,000/month budget meeting savings and spending goals
      based on 2 months of historical data.

scoring:
  reward_range: [0.0, 1.0]
  success_threshold: 0.5

constraints:
  max_runtime_seconds: 1200
  max_memory_gb: 8
  max_vcpu: 2
